server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 301 redirects: old WordPress blog URLs -> new /blog/ URLs
  location = /how-much-does-window-cleaning-cost-in-ventura-county/ { return 301 /blog/how-much-does-window-cleaning-cost-in-ventura-county/; }
  location = /professional-solar-panel-cleaning-vs-diy-cleaning/ { return 301 /blog/professional-solar-panel-cleaning-vs-diy-cleaning/; }
  location = /when-and-how-often-solar-panel-cleaning-should-be-done/ { return 301 /blog/when-and-how-often-solar-panel-cleaning-should-be-done/; }
  location = /window-cleaning-thousand-oaks-a-complete-guide-for-homeowners/ { return 301 /blog/window-cleaning-thousand-oaks-a-complete-guide-for-homeowners/; }
  location = /window-washing-ventura-county-why-professional-cleaning-makes-a-difference/ { return 301 /blog/window-washing-ventura-county-why-professional-cleaning-makes-a-difference/; }
  location = /window-cleaning-ventura-county-what-homeowners-should-know-before-hiring-professionals/ { return 301 /blog/window-cleaning-ventura-county-what-homeowners-should-know-before-hiring-professionals/; }

  # 301 redirects: old WordPress service pages -> new /services/ URLs
  location = /solar-panel-cleaning/ { return 301 /services/solar-panel-cleaning/; }
  location = /screen-cleaning/ { return 301 /services/screen-cleaning/; }
  location = /window-washing/ { return 301 /services/window-washing/; }

  # Block old WordPress paths (no content to serve, return 410 Gone)
  location /wp-admin { return 410; }
  location /wp-login.php { return 410; }
  location /wp-content { return 410; }
  location /wp-includes { return 410; }
  location /xmlrpc.php { return 410; }

  # Static asset caching
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Astro static pages
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
